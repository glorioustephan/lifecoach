<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a1d22" />
    <title>Lifecoach</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body class="bg-bg text-fg font-sans antialiased">
    <!-- Apply persisted theme before React mounts to prevent a flash of the
         default (dark). Mirrors lib/theme.ts; keep both in sync. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("lifecoach.theme");
          if (t === "light") {
            var r = document.documentElement;
            r.classList.remove("dark");
            r.classList.add("light");
          }
        } catch (_) { /* localStorage disabled — stay on dark default */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
